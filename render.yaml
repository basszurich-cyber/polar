services:
  - type: web
    name: polar-backend
    env: docker
    dockerfilePath: server/Dockerfile
    buildCommand: ""
    startCommand: "uv run task api"
    envVars:
      POLAR_ENV: "production"
      POLAR_LOG_LEVEL: "INFO"

      # Postgres
      POLAR_POSTGRES_HOST:
        fromService: polar-postgres
        name: hostname
      POLAR_POSTGRES_PORT:
        fromService: polar-postgres
        name: port
      POLAR_POSTGRES_DATABASE: "polar"
      POLAR_POSTGRES_USERNAME:
        fromService: polar-postgres
        name: username
      POLAR_POSTGRES_PASSWORD:
        fromService: polar-postgres
        name: password

      # Redis
      POLAR_REDIS_HOST:
        fromService: polar-redis
        name: hostname
      POLAR_REDIS_PORT:
        fromService: polar-redis
        name: port

      # S3 — dummy values for now
      POLAR_AWS_ACCESS_KEY_ID: "local"
      POLAR_AWS_SECRET_ACCESS_KEY: "local"
      POLAR_S3_CUSTOMER_INVOICES_BUCKET_NAME: "polar-invoices"
      POLAR_S3_PAYOUT_INVOICES_BUCKET_NAME: "polar-payouts"
      POLAR_S3_ENDPOINT_URL: "http://localhost:9000"

  - type: redis
    name: polar-redis
    plan: free

databases:
  - name: polar-postgres
    plan: free
